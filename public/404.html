<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FAT</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Saves the path to sessionStorage and redirects to index.html
      var path = window.location.pathname;
      sessionStorage.setItem('redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
